---

# Wait for lock on apt to be released
- name: Wait for apt lock to be released
  ansible.builtin.shell: |
    while fuser /var/lib/dpkg/lock >/dev/null 2>&1 || fuser /var/lib/apt/lists/lock >/dev/null 2>&1; do
      sleep 5;
    done
  changed_when: false


# Install required packages for Docker and update apt cache
- name: Install required packages for Docker and update apt cache
  ansible.builtin.apt:
    name:
      - curl
      - git
      - apt-transport-https
      - ca-certificates
    update_cache: yes
    state: present

# Note: Docker need to be installed with @V2, otherwise it will cause error when running docker-compose


# Create Docker GPG keyring
- name: Create Docker GPG keyring
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

# Download Docker official GPG key
- name: Download Docker official GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

# Add Docker repository to apt sources
- name: Add Docker repository to apt sources
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

# Update apt cache after adding Docker repository
- name: Update apt cache after adding Docker repository
  ansible.builtin.apt:
    update_cache: yes

# Install Docker and Docker Compose
- name: Install Docker and Docker Compose
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present


# Ensure Docker service is enabled and started
- name: Ensure Docker service is enabled and started
  ansible.builtin.service:
    name: docker
    state: started
    enabled: yes

